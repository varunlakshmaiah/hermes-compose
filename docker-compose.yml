services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    tty: true
    stdin_open: true
    volumes:
      # Persistent storage for memories, skills, and configuration
      - hermes-data:/data
    env_file:
      - .env
    environment:
      # These core variables are hardcoded to ensure the container functions correctly.
      # Any other variables (API keys, integrations) will be dynamically loaded from the .env file / Dokploy UI!
      - HERMES_HOME=/data
      - HERMES_LOG_LEVEL=info
      - HERMES_DASHBOARD=1
      - HERMES_ALLOW_ROOT_GATEWAY=1
    ports:
      # Bound to 127.0.0.1 for security! This prevents public access on a VPS.
      # Local users can still access it at localhost:9119.
      # Dokploy/Traefik will route traffic internally without needing public host ports.
      - "127.0.0.1:9119:9119" # Agent Dashboard
      - "127.0.0.1:8765:8765" # Gateway HTTP port for webhooks

volumes:
  # Managed persistent storage
  hermes-data:
